<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" role="img" aria-label="Illustration of an operations dashboard: kanban board, metrics, and a trend chart">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1B3A6B" flood-opacity="0.16"/>
    </filter>
  </defs>
  <!-- soft backdrop shapes -->
  <circle cx="600" cy="120" r="150" fill="#D97706" opacity="0.08"/>
  <circle cx="120" cy="470" r="120" fill="#1B3A6B" opacity="0.06"/>

  <!-- main dashboard card -->
  <g filter="url(#soft)">
    <rect x="70" y="60" width="560" height="440" rx="22" fill="#FAFAF8" stroke="#E5E7EB" stroke-width="1.5"/>
  </g>
  <!-- top bar -->
  <rect x="70" y="60" width="560" height="52" rx="22" fill="#1B3A6B"/>
  <rect x="70" y="90" width="560" height="22" fill="#1B3A6B"/>
  <circle cx="100" cy="86" r="5" fill="#D97706"/>
  <circle cx="118" cy="86" r="5" fill="#FAFAF8" opacity="0.5"/>
  <circle cx="136" cy="86" r="5" fill="#FAFAF8" opacity="0.5"/>
  <rect x="250" y="80" width="200" height="12" rx="6" fill="#FAFAF8" opacity="0.25"/>

  <!-- stat tiles -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="94" y="134" width="150" height="78" rx="12" fill="#FAFAF8" stroke="#E5E7EB"/>
    <text x="110" y="172" font-size="30" font-weight="600" fill="#1B3A6B">98%</text>
    <text x="110" y="194" font-size="12" fill="#4B5563">data accuracy</text>

    <rect x="256" y="134" width="150" height="78" rx="12" fill="#1B3A6B"/>
    <text x="272" y="172" font-size="30" font-weight="600" fill="#FAFAF8">50%</text>
    <text x="272" y="194" font-size="12" fill="#B8C7DE">manual work cut</text>

    <rect x="418" y="134" width="188" height="78" rx="12" fill="#FAFAF8" stroke="#E5E7EB"/>
    <text x="434" y="172" font-size="30" font-weight="600" fill="#D97706">15+</text>
    <text x="434" y="194" font-size="12" fill="#4B5563">hours saved weekly</text>
  </g>

  <!-- trend chart -->
  <rect x="94" y="230" width="300" height="238" rx="12" fill="#FAFAF8" stroke="#E5E7EB"/>
  <text x="112" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#111827">Delivery trend</text>
  <g stroke="#E5E7EB" stroke-width="1">
    <line x1="112" y1="300" x2="372" y2="300"/><line x1="112" y1="350" x2="372" y2="350"/><line x1="112" y1="400" x2="372" y2="400"/>
  </g>
  <polyline points="120,420 168,392 216,404 264,344 312,318 360,276" fill="none" stroke="#D97706" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#1B3A6B">
    <circle cx="120" cy="420" r="4"/><circle cx="168" cy="392" r="4"/><circle cx="216" cy="404" r="4"/><circle cx="264" cy="344" r="4"/><circle cx="312" cy="318" r="4"/><circle cx="360" cy="276" r="4"/>
  </g>

  <!-- kanban -->
  <rect x="410" y="230" width="196" height="238" rx="12" fill="#FAFAF8" stroke="#E5E7EB"/>
  <text x="428" y="260" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#111827">Automations</text>
  <g>
    <rect x="428" y="278" width="160" height="30" rx="7" fill="#FAFAF8" stroke="#E5E7EB"/>
    <rect x="440" y="289" width="8" height="8" rx="2" fill="#D97706"/>
    <rect x="458" y="288" width="96" height="10" rx="5" fill="#E5E7EB"/>

    <rect x="428" y="318" width="160" height="30" rx="7" fill="#FAFAF8" stroke="#E5E7EB"/>
    <rect x="440" y="329" width="8" height="8" rx="2" fill="#1B3A6B"/>
    <rect x="458" y="328" width="120" height="10" rx="5" fill="#E5E7EB"/>

    <rect x="428" y="358" width="160" height="30" rx="7" fill="#1B3A6B"/>
    <rect x="440" y="369" width="8" height="8" rx="2" fill="#D97706"/>
    <rect x="458" y="368" width="86" height="10" rx="5" fill="#FAFAF8" opacity="0.5"/>

    <rect x="428" y="398" width="160" height="30" rx="7" fill="#FAFAF8" stroke="#E5E7EB"/>
    <rect x="440" y="409" width="8" height="8" rx="2" fill="#1B3A6B"/>
    <rect x="458" y="408" width="104" height="10" rx="5" fill="#E5E7EB"/>
  </g>
</svg>
